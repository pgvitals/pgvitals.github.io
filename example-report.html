<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL Diagnostic Report Example — pgvitals</title>
  <meta name="description" content="A real pgvitals diagnostic run against the EBI RNAcentral PostgreSQL 16 database (638 GB). See exactly what output to expect: index bloat, missing FK indexes, XID wraparound, connection patterns, and more." />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="pgvitals" />
  <meta name="keywords" content="PostgreSQL diagnostic report, pgvitals example, database health report, PostgreSQL audit output, index health report, vacuum report" />
  <link rel="canonical" href="https://pgvitals.github.io/example-report.html" />

  <meta property="og:site_name" content="pgvitals" />
  <meta property="og:title" content="PostgreSQL Diagnostic Report Example — pgvitals" />
  <meta property="og:description" content="A real pgvitals diagnostic run on a 638 GB production PostgreSQL 16 database. 41 sections — index bloat, missing FK indexes, XID wraparound risk, checkpoint pressure, and more." />
  <meta property="og:url" content="https://pgvitals.github.io/example-report.html" />
  <meta property="og:type" content="article" />
  <meta property="og:image" content="https://pgvitals.github.io/og-image.svg" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="PostgreSQL Diagnostic Report Example — pgvitals" />
  <meta name="twitter:description" content="A real pgvitals run on a 638 GB production PostgreSQL 16 database — see what to expect from all 41 diagnostic sections." />
  <meta name="twitter:image" content="https://pgvitals.github.io/og-image.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="/shell.css" />
  <script src="/shell.js" defer></script>
  <style>
    :root {
      --accent:        #1d4ed8;
      --accent-light:  #2563eb;
      --accent-pale:   #eff6ff;
      --accent-border: #bfdbfe;
      --accent-text:   #93c5fd;
      --hero-bg:       #0f172a;
      --ink:           #0f172a;
      --ink-mid:       #334155;
      --slate:         #64748b;
      --slate-light:   #94a3b8;
      --border:        #e2e8f0;
      --bg:            #f8fafc;
      --white:         #ffffff;
      --green:         #15803d;
      --green-pale:    #f0fdf4;
      --green-border:  #bbf7d0;
      --wrap:          880px;
      --px:            32px;
      --radius:        6px;
      --radius-lg:     12px;
    }

    body { background: var(--bg); }

    /* ── Page header ─────────────────────────────────────── */
    .page-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 40px var(--px) 32px;
    }

    .page-header-inner {
      max-width: var(--wrap);
      margin: 0 auto;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--slate);
      margin-bottom: 16px;
    }

    .breadcrumb a { color: var(--slate); text-decoration: none; }
    .breadcrumb a:hover { color: var(--accent); }

    .page-header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.6rem, 2.5vw, 2.2rem);
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    .page-header-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-size: 13px;
      color: var(--slate);
    }

    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 3px 12px;
      font-size: 12px;
      font-weight: 600;
    }

    /* ── Report body ─────────────────────────────────────── */
    .report-wrap {
      max-width: var(--wrap);
      margin: 0 auto;
      padding: 40px var(--px) 80px;
    }

    /* Markdown render styles */
    .report-body h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.5px;
      margin: 40px 0 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
    }

    .report-body h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--ink);
      margin: 36px 0 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .report-body h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--ink);
      margin: 28px 0 10px;
    }

    .report-body p { margin-bottom: 14px; color: var(--ink-mid); }

    .report-body blockquote {
      border-left: 3px solid var(--accent-border);
      background: var(--accent-pale);
      padding: 12px 18px;
      border-radius: 0 var(--radius) var(--radius) 0;
      margin: 0 0 16px;
    }

    .report-body blockquote p { margin: 0; color: var(--ink-mid); font-size: 13.5px; }

    .report-body blockquote strong { color: var(--ink); }

    .report-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .report-body th {
      background: var(--bg);
      padding: 9px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--slate);
      border-bottom: 1px solid var(--border);
    }

    .report-body td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--ink-mid);
      vertical-align: top;
    }

    .report-body tr:last-child td { border-bottom: none; }
    .report-body tr:hover td { background: var(--bg); }

    .report-body pre {
      background: var(--hero-bg);
      border-radius: var(--radius);
      padding: 16px 18px;
      overflow-x: auto;
      margin-bottom: 18px;
      font-size: 12px;
      line-height: 1.7;
    }

    .report-body code {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 0.85em;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 2px 5px;
      border-radius: 3px;
      color: var(--ink);
    }

    .report-body pre code {
      background: transparent;
      border: none;
      padding: 0;
      color: #e2e8f0;
      font-size: 12px;
    }

    .report-body ul, .report-body ol {
      padding-left: 22px;
      margin-bottom: 14px;
    }

    .report-body li { margin-bottom: 5px; color: var(--ink-mid); }

    .report-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    .report-body details {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 14px;
    }

    .report-body summary {
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      color: var(--slate);
    }

    .report-body summary:hover { color: var(--ink); }

    /* GitHub-style note/tip callouts */
    .report-body .markdown-alert {
      border-left: 3px solid var(--accent-border);
      padding: 10px 16px;
      margin-bottom: 16px;
      border-radius: 0 var(--radius) var(--radius) 0;
      background: var(--accent-pale);
      font-size: 13.5px;
    }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--slate);
      font-size: 15px;
    }

    @media (max-width: 680px) {
      :root { --px: 20px; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

<!-- Nav -->
<!-- Page header -->
<div class="page-header">
  <div class="page-header-inner">
    <div class="breadcrumb">
      <a href="/">pgvitals</a>
      <span>/</span>
      <span>Example Report</span>
    </div>
    <h1>Sample Diagnostic Report</h1>
    <div class="page-header-meta">
      <span class="meta-chip">🌍 Real database, live data</span>
      <span class="meta-chip">🐘 PostgreSQL 16.11</span>
      <span class="meta-chip">📦 638 GB production DB</span>
      <span class="meta-chip">41 sections run</span>
    </div>
  </div>
</div>

<!-- Report content -->
<div class="report-wrap">
  <div class="report-body" id="report-body">
    <div class="loading">Loading report…</div>
  </div>
</div>


<script>
  marked.setOptions({
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;
      }
      return hljs.highlightAuto(code).value;
    },
    breaks: false,
    gfm: true,
  });

  fetch('/example-report.md')
    .then(r => r.text())
    .then(md => {
      // Convert GitHub-style [!NOTE] and [!TIP] callouts to styled divs
      md = md.replace(/>\s*\[!(NOTE|TIP|WARNING)\]\s*\n((?:>.*\n?)+)/g, (_, type, body) => {
        const content = body.replace(/^>\s*/gm, '').trim();
        const icons = { NOTE: 'ℹ️', TIP: '💡', WARNING: '⚠️' };
        return `<div class="markdown-alert">${icons[type] || ''} ${content}</div>\n\n`;
      });

      document.getElementById('report-body').innerHTML = marked.parse(md);

      // Remove the h1 since we have it in the page-header already
      const h1 = document.querySelector('.report-body h1');
      if (h1) h1.remove();

      // Highlight any leftover code blocks
      document.querySelectorAll('.report-body pre code').forEach(el => {
        hljs.highlightElement(el);
      });
    })
    .catch(err => {
      document.getElementById('report-body').innerHTML =
        '<p style="color:#ef4444">Failed to load report. Try opening via a local server.</p>';
    });
</script>

</body>
</html>
